worker_processes auto;
events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Final Production Gateway Configuration
    server {
        listen 80;
        listen [::]:80;
        server_name localhost;

        # ── Dashboard (Gateway Home) ──────────────────────────────────
        location / {
            add_header Content-Type "text/html; charset=UTF-8";
            return 200 '
            <!DOCTYPE html>
            <html lang="en">
            <head>
                <meta charset="UTF-8">
                <title>NexusShop AI | API Gateway</title>
                <style>
                    body { font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #f8fafc; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
                    .card { background: #1e293b; padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); text-align: center; border: 1px solid #334155; }
                    h1 { color: #38bdf8; margin-bottom: 0.5rem; }
                    .status { display: inline-block; padding: 0.25rem 0.75rem; background: #065f46; color: #34d399; border-radius: 9999px; font-size: 0.875rem; font-weight: 600; margin-bottom: 1.5rem; }
                    .links { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
                    a { display: block; padding: 0.75rem; background: #334155; color: white; text-decoration: none; border-radius: 0.5rem; transition: background 0.2s; font-size: 0.9rem; }
                    a:hover { background: #475569; }
                </style>
            </head>
            <body>
                <div class="card">
                    <h1>🛡️ NexusShop AI</h1>
                    <div class="status">GATEWAY: ACTIVE / PRODUCTION</div>
                    <p>Centralized Microservices Entry Point (v1.2.0)</p>
                    <div class="links">
                        <a href="https://nexus-shop-ai.onrender.com/docs" target="_blank">🔐 Auth Swagger</a>
                        <a href="https://nexus-shop-ai-1.onrender.com/docs" target="_blank">📦 Product Swagger</a>
                        <a href="https://nexus-shop-ai-3.onrender.com/docs" target="_blank">🤖 Chatbot Swagger</a>
                        <a href="https://nexus-api-gateway-t515.onrender.com/api/v1/health" target="_blank">💓 Health Check</a>
                    </div>
                </div>
            </body>
            </html>';
        }

        # ── API Routing (Microservices) ──────────────────────────────
        
        # SSL Verification for Render Internal Proxying
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 1. Auth Service Mapping
        # /api/v1/auth/register -> nexus-shop-ai.onrender.com/api/v1/users/register
        location /api/v1/auth/ {
            proxy_pass https://nexus-shop-ai.onrender.com/api/v1/users/;
        }

        # 2. Product Service Mapping
        location /api/v1/products/ {
            proxy_pass https://nexus-shop-ai-1.onrender.com/api/v1/products/;
        }

        # 3. Order Service Mapping
        location /api/v1/orders/ {
            proxy_pass https://nexus-shop-ai-2.onrender.com/api/v1/orders/;
        }

        # 4. Chatbot RAG Mapping
        location /api/v1/chatbot/ {
            proxy_pass https://nexus-shop-ai-3.onrender.com/api/v1/chatbot/;
        }

        # 5. Chat Endpoint Mapping
        location /api/v1/chat/ {
            proxy_pass https://nexus-shop-ai-3.onrender.com/api/v1/chat/;
        }

        # Global Health Check
        location /api/v1/health {
            add_header Content-Type application/json;
            return 200 '{"status": "Gateway is online", "version": "1.2.0"}';
        }

        # Error Handling
        error_page 502 /502.json;
        location = /502.json {
            add_header Content-Type application/json;
            return 502 '{"status": "error", "message": "Upstream Service Unavailable. The microservice may be deploying or asleep."}';
        }
    }
}
