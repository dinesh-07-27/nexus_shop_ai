user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # The centralized Gateway Server
    server {
        listen 80;
        server_name _; # Match any hostname/IP

        # Add global CORS headers for frontend consumption
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, Origin, User-Agent' always;

        # Pre-flight request handling
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Health Check Route
        location = /health {
            default_type application/json;
            return 200 '{"status": "API Gateway (Nginx) is healthy", "version": "v1"}';
        }

        # Root Route (Matches exact / to provide a welcome dashboard)
        location = / {
            default_type text/html;
            return 200 '<!DOCTYPE html><html><head><title>NexusShop API Gateway</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;padding:3rem;background-color:#111827;color:#f3f4f6;}h1{color:#60a5fa;}p{font-size:1.1rem;}a{color:#38bdf8;text-decoration:none;font-weight:bold;}a:hover{text-decoration:underline;}.card{background-color:#1f2937;padding:1.5rem;border-radius:0.5rem;margin-bottom:1rem;border-left:4px solid #3b82f6;}code{background-color:#000;padding:2px 6px;border-radius:4px;color:#34d399;}</style></head><body><h1>🚀 NexusShop AI Production Gateway</h1><p>You have successfully reached the centralized Nginx load balancer. This infrastructure routes traffic securely across four independent microservices.</p><br><h2>📚 Available API Documentation UIs</h2><div class="card"><h3>👤 User & Auth Service (FastAPI)</h3><p>Handles JWT, Registration, and RBAC.</p><a href="/auth/docs">➔ Open Interactive Swagger UI</a></div><div class="card"><h3>📦 Product Service (Elasticsearch)</h3><p>Handles the core catalog and fuzzy searching.</p><a href="/products/docs">➔ Open Interactive Swagger UI</a></div><div class="card"><h3>🤖 Chatbot & RAG Recommendation Service</h3><p>Semantic vector search embeddings powered by Gemini.</p><a href="/recommendations/docs">➔ Open Interactive Swagger UI</a></div><div class="card"><h3>🛒 Order Saga Service (Django/RabbitMQ)</h3><p>Handles distributed checkout flows. (No UI, test via Postman POSTing to <code>/orders/checkout/</code>).</p></div></body></html>';
        }

        # Route 1: Auth & User Service  /api/v1/auth/ -> nexus-shop-ai.onrender.com/api/v1/users/
        location /api/v1/auth/ {
            proxy_pass https://nexus-shop-ai.onrender.com/api/v1/users/;
            proxy_ssl_server_name on;
            proxy_set_header Host nexus-shop-ai.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Prefix /api/v1/auth;
        }

        # Route 2: Auth Service Swagger UI passthrough
        location /api/v1/auth/docs {
            proxy_pass https://nexus-shop-ai.onrender.com/docs;
            proxy_ssl_server_name on;
            proxy_set_header Host nexus-shop-ai.onrender.com;
        }

        # Route 3: Product Catalog  /api/v1/products/ -> nexus-shop-ai-1.onrender.com/api/v1/products/
        location /api/v1/products/ {
            proxy_pass https://nexus-shop-ai-1.onrender.com/api/v1/products/;
            proxy_ssl_server_name on;
            proxy_set_header Host nexus-shop-ai-1.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Prefix /api/v1/products;
        }

        # Route 4: Product Service Swagger UI passthrough
        location /api/v1/products/docs {
            proxy_pass https://nexus-shop-ai-1.onrender.com/docs;
            proxy_ssl_server_name on;
            proxy_set_header Host nexus-shop-ai-1.onrender.com;
        }

        # Route 5: Order Saga  /api/v1/orders/ -> nexus-shop-ai-2.onrender.com/api/v1/
        location /api/v1/orders/ {
            proxy_pass https://nexus-shop-ai-2.onrender.com/api/v1/;
            proxy_ssl_server_name on;
            proxy_set_header Host nexus-shop-ai-2.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Prefix /api/v1/orders;
        }

        # Route 6: Chatbot RAG  /api/v1/chatbot/ -> nexus-shop-ai-3.onrender.com/api/v1/
        location /api/v1/chatbot/ {
            proxy_pass https://nexus-shop-ai-3.onrender.com/api/v1/;
            proxy_ssl_server_name on;
            proxy_set_header Host nexus-shop-ai-3.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Prefix /api/v1/chatbot;
        }

        # Route 7: Chatbot Swagger UI passthrough
        location /api/v1/chatbot/docs {
            proxy_pass https://nexus-shop-ai-3.onrender.com/docs;
            proxy_ssl_server_name on;
            proxy_set_header Host nexus-shop-ai-3.onrender.com;
        }

        # Custom JSON 502 Bad Gateway Response to replace default HTML error
        error_page 502 = @bad_gateway;
        location @bad_gateway {
            return 502 '{"error": "502 Bad Gateway", "detail": "The internal microservice is currently unreachable or offline. Please wait or check logs."}';
            add_header Content-Type application/json;
        }

    }
}
