worker_processes auto;
events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;
        listen [::]:80;
        server_name localhost;

        # ── Dashboard (Gateway Home) ──────────────────────────────────
        location / {
            add_header Content-Type "text/html; charset=UTF-8";
            return 200 '
            <!DOCTYPE html>
            <html lang="en">
            <head>
                <meta charset="UTF-8">
                <title>NexusShop AI | API Gateway</title>
                <style>
                    body { font-family: "Segoe UI", sans-serif; background: #0f172a; color: #f8fafc; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
                    .card { background: #1e293b; padding: 2.5rem; border-radius: 1.5rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); text-align: center; border: 1px solid #334155; max-width: 500px; width: 90%; }
                    h1 { color: #38bdf8; margin-bottom: 0.5rem; font-size: 2.2rem; }
                    .status { display: inline-block; padding: 0.4rem 1rem; background: #064e3b; color: #34d399; border-radius: 9999px; font-size: 0.8rem; font-weight: 700; margin-bottom: 1.5rem; letter-spacing: 0.05em; }
                    .description { color: #94a3b8; margin-bottom: 2rem; font-size: 0.95rem; line-height: 1.5; }
                    .links { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
                    .docs-btn { grid-column: span 2; background: #0369a1 !important; font-weight: 700; border: 1px solid #38bdf8 !important; }
                    a { display: flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.8rem; background: #334155; color: white; text-decoration: none; border-radius: 0.75rem; transition: all 0.2s; font-size: 0.85rem; border: 1px solid transparent; }
                    a:hover { background: #475569; transform: translateY(-2px); border-color: #64748b; }
                    .docs-btn:hover { background: #0ea5e9 !important; box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); }
                </style>
            </head>
            <body>
                <div class="card">
                    <h1>🛡️ NexusShop AI</h1>
                    <div class="status">● GATEWAY: ACTIVE / PRODUCTION</div>
                    <p class="description">Production-ready Microservices Architecture with AI RAG Search, Saga Transactions, and Secure JWT Auth.</p>
                    <div class="links">
                        <a href="https://documenter.getpostman.com/view/53450945/2sBXinJWj1" target="_blank" class="docs-btn">📖 View API Docs (Postman)</a>
                        <a href="https://nexus-shop-ai.onrender.com/docs" target="_blank">🔐 Auth Swagger</a>
                        <a href="https://nexus-shop-ai-1.onrender.com/docs" target="_blank">📦 Product Swagger</a>
                        <a href="https://nexus-shop-ai-3.onrender.com/docs" target="_blank">🤖 Chatbot Swagger</a>
                        <a href="https://nexus-api-gateway-t515.onrender.com/api/v1/health" target="_blank">💓 Health Check</a>
                    </div>
                </div>
            </body>
            </html>';
        }

        # ── API Routing ──────────────────────────────────────────────
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 🔐 Auth Mapping
        location /api/v1/auth/ {
            proxy_pass https://nexus-shop-ai.onrender.com/api/v1/users/;
        }

        # 📦 Product Mapping
        location /api/v1/products/ {
            proxy_pass https://nexus-shop-ai-1.onrender.com/api/v1/products/;
        }

        # 🛒 Order Mapping
        location /api/v1/orders/ {
            proxy_pass https://nexus-shop-ai-2.onrender.com/api/v1/orders/;
        }

        # 🤖 Chatbot consolidated mapping
        location /api/v1/chatbot/chat {
            proxy_pass https://nexus-shop-ai-3.onrender.com/api/v1/chat/;
        }
        location /api/v1/chatbot/ {
            proxy_pass https://nexus-shop-ai-3.onrender.com/api/v1/chatbot/;
        }

        # Global Health
        location /api/v1/health {
            add_header Content-Type application/json;
            return 200 '{"status": "Gateway is online", "version": "1.2.2"}';
        }
    }
}
