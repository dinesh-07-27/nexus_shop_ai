user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    charset       utf-8;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;
        server_name _;

        # Global CORS
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept' always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # ── Health Check ─────────────────────────────────────────────────────
        location = /health {
            default_type application/json;
            return 200 '{"status": "API Gateway is healthy", "version": "v1"}';
        }

        # ── Gateway Dashboard (Root) ──────────────────────────────────────────
        location = / {
            add_header Content-Type 'text/html; charset=utf-8';
            return 200 '<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NexusShop AI - API Gateway</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;padding:2rem}h1{font-size:2rem;color:#60a5fa;margin-bottom:.5rem}.sub{color:#94a3b8;margin-bottom:2rem;font-size:1.05rem}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem;margin-top:1.5rem}.card{background:#1e293b;border-radius:1rem;padding:1.5rem;border:1px solid #334155;transition:border-color .2s}.card:hover{border-color:#60a5fa}.card h3{color:#f1f5f9;margin-bottom:.5rem;font-size:1.1rem}.card p{color:#94a3b8;font-size:.9rem;margin-bottom:1rem}.badge{display:inline-block;background:#1d4ed8;color:#bfdbfe;padding:2px 10px;border-radius:9999px;font-size:.75rem;margin-bottom:.75rem}a.btn{display:inline-block;background:#2563eb;color:#fff;padding:.5rem 1.2rem;border-radius:.5rem;text-decoration:none;font-size:.9rem;font-weight:600}a.btn:hover{background:#1d4ed8}.tag{background:#0f172a;color:#34d399;padding:2px 8px;border-radius:4px;font-family:monospace;font-size:.8rem}.status{padding:.75rem 1.5rem;background:#052e16;border:1px solid #166534;border-radius:.5rem;color:#4ade80;margin-bottom:2rem;font-size:.95rem}</style></head><body><h1>NexusShop AI &mdash; Production API Gateway</h1><p class="sub">Centralized Nginx load balancer routing to 4 independent microservices.</p><div class="status">&#x2714; Gateway is live. All routes use <code style="background:#0f172a;color:#34d399;padding:2px 6px;border-radius:4px">/api/v1/</code> versioning with JWT auth &amp; RBAC.</div><div class="grid"><div class="card"><span class="badge">FastAPI + JWT + RBAC</span><h3>User &amp; Auth Service</h3><p>Register, Login, get JWT token. Role-based access (admin / user).</p><a class="btn" href="/api/v1/auth/docs">Open Swagger UI &rarr;</a></div><div class="card"><span class="badge">FastAPI + Elasticsearch</span><h3>Product Catalog Service</h3><p>Browse products, fuzzy search, AI review summaries. Admin-only creation.</p><a class="btn" href="/api/v1/products/docs">Open Swagger UI &rarr;</a></div><div class="card"><span class="badge">FastAPI + Gemini AI</span><h3>Chatbot &amp; RAG Service</h3><p>Semantic FAISS vector search powered by Google Gemini LLM.</p><a class="btn" href="/api/v1/chatbot/docs">Open Swagger UI &rarr;</a></div><div class="card"><span class="badge">Django + RabbitMQ</span><h3>Order Saga Service</h3><p>Cart, checkout saga, Celery async payment processing.</p><p style="margin-top:.5rem"><span class="tag">POST /api/v1/orders/cart/add/</span><br><br><span class="tag">POST /api/v1/orders/checkout/</span></p></div></div></body></html>';
        }

        # ── Route 1: Auth /api/v1/auth/ ───────────────────────────────────────
        location /api/v1/auth/docs {
            proxy_pass https://nexus-shop-ai.onrender.com/docs;
            proxy_ssl_server_name on;
            proxy_set_header Host nexus-shop-ai.onrender.com;
        }

        location /api/v1/auth/openapi.json {
            proxy_pass https://nexus-shop-ai.onrender.com/openapi.json;
            proxy_ssl_server_name on;
            proxy_set_header Host nexus-shop-ai.onrender.com;
        }

        location /api/v1/auth/ {
            proxy_pass https://nexus-shop-ai.onrender.com/api/v1/users/;
            proxy_ssl_server_name on;
            proxy_set_header Host nexus-shop-ai.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Prefix /api/v1/auth;
        }

        # ── Route 2: Products /api/v1/products/ ──────────────────────────────
        location /api/v1/products/docs {
            proxy_pass https://nexus-shop-ai-1.onrender.com/docs;
            proxy_ssl_server_name on;
            proxy_set_header Host nexus-shop-ai-1.onrender.com;
        }

        location /api/v1/products/openapi.json {
            proxy_pass https://nexus-shop-ai-1.onrender.com/openapi.json;
            proxy_ssl_server_name on;
            proxy_set_header Host nexus-shop-ai-1.onrender.com;
        }

        location /api/v1/products/ {
            proxy_pass https://nexus-shop-ai-1.onrender.com/api/v1/products/;
            proxy_ssl_server_name on;
            proxy_set_header Host nexus-shop-ai-1.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Prefix /api/v1/products;
        }

        # ── Route 3: Orders /api/v1/orders/ ──────────────────────────────────
        location /api/v1/orders/ {
            proxy_pass https://nexus-shop-ai-2.onrender.com/api/v1/;
            proxy_ssl_server_name on;
            proxy_set_header Host nexus-shop-ai-2.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Prefix /api/v1/orders;
        }

        # ── Route 4: Chatbot /api/v1/chatbot/ ────────────────────────────────
        location /api/v1/chatbot/docs {
            proxy_pass https://nexus-shop-ai-3.onrender.com/docs;
            proxy_ssl_server_name on;
            proxy_set_header Host nexus-shop-ai-3.onrender.com;
        }

        location /api/v1/chatbot/openapi.json {
            proxy_pass https://nexus-shop-ai-3.onrender.com/openapi.json;
            proxy_ssl_server_name on;
            proxy_set_header Host nexus-shop-ai-3.onrender.com;
        }

        location /api/v1/chatbot/ {
            proxy_pass https://nexus-shop-ai-3.onrender.com/api/v1/;
            proxy_ssl_server_name on;
            proxy_set_header Host nexus-shop-ai-3.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Prefix /api/v1/chatbot;
        }

        # ── Custom 502 JSON Error ─────────────────────────────────────────────
        error_page 502 = @bad_gateway;
        location @bad_gateway {
            default_type application/json;
            return 502 '{"error": "502 Bad Gateway", "detail": "The backend microservice is offline or starting up. Try again in 30 seconds."}';
        }
    }
}
