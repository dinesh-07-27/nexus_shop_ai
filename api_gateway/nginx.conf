user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # The centralized Gateway Server
    server {
        listen 80;
        server_name _; # Match any hostname/IP

        # Add global CORS headers for frontend consumption
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, Origin, User-Agent' always;

        # Pre-flight request handling
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Health Check Route
        location /health {
            return 200 '{"status": "API Gateway (Nginx) is running"}';
            add_header Content-Type application/json;
        }

        # Route 1: Authentication & User Profiles
        # The trailing slash on BOTH the location and proxy_pass strips the "/auth" prefix
        # and passes the remainder to the internal user_service cleanly.
        location /auth/ {
            proxy_pass http://auth-service:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Fix Swagger UI generation issues by telling FastAPI its external root path
            proxy_set_header X-Forwarded-Prefix /auth;
        }

        # Route 2: Product Catalog & Elasticsearch
        location /products/ {
            proxy_pass http://product-service:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Prefix /products;
        }

        # Route 3: Distributed Order Saga & Redis Cache
        location /orders/ {
            proxy_pass http://order-service:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Prefix /orders;
        }

        # Route 4: Chatbot RAG AI Recommendations
        location /recommendations/ {
            proxy_pass http://recommendation-service:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Prefix /recommendations;
        }

        # Custom JSON 502 Bad Gateway Response to replace default HTML error
        error_page 502 = @bad_gateway;
        location @bad_gateway {
            return 502 '{"error": "502 Bad Gateway", "detail": "The internal microservice is currently unreachable or offline. Please wait or check logs."}';
            add_header Content-Type application/json;
        }

    }
}
